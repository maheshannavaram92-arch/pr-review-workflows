name: PR Agent

on:
  workflow_call:
    inputs:
      auto_describe:
        description: "Enable auto describe"
        required: false
        default: true
        type: boolean
      auto_improve:
        description: "Enable auto improve"
        required: false
        default: true
        type: boolean
      auto_review:
        description: "Enable auto review"
        required: false
        default: true
        type: boolean
      feedback:
        description: "Enable feedback comment"
        required: false
        default: true
        type: boolean
      pr_url:
        description: "Pull Request URL"
        required: true
        type: string
    secrets:
      APP_ID:
        required: true
      GROQ_API_KEY:
        required: true
      PR_AGENT_WRAPPER_PRIVATE_KEY:
        required: true

jobs:
  pr_agent:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PR_AGENT_WRAPPER_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Debug Groq Key          # ← ADD HERE
        run: |
          echo "GROQ KEY starts with: $(echo '${{ secrets.GROQ_API_KEY }}' | cut -c1-7)"
          echo "GROQ KEY length: ${#GROQ_KEY}"
        env:
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          
      - name: Auto Describe
        if: inputs.auto_describe == true
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          docker run --rm \
            -e "github.user_token=${TOKEN}" \
            -e "github.deployment_type=user" \
            -e "OPENAI.KEY=${{ secrets.GROQ_API_KEY }}" \
            -e "OPENAI.API_TYPE=groq" \
            -e "config.model=groq/llama-3.3-70b-versatile" \
            -e "config.fallback_models=[]" \
            -e "config.temperature=0.2" \
            -e "pr_description.enable_large_pr_handling=true" \
            -e "pr_description.inline_file_summary=true" \
            codiumai/pr-agent:latest \
            --pr_url="${{ inputs.pr_url }}" describe

      - name: Auto Review
        if: inputs.auto_review == true
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          docker run --rm \
            -e "github.user_token=${TOKEN}" \
            -e "github.deployment_type=user" \
            -e "OPENAI.KEY=${{ secrets.GROQ_API_KEY }}" \
            -e "OPENAI.API_TYPE=groq" \
            -e "config.model=groq/llama-3.3-70b-versatile" \
            -e "config.fallback_models=[]" \
            -e "config.temperature=0.2" \
            codiumai/pr-agent:latest \
            --pr_url="${{ inputs.pr_url }}" review

      - name: Auto Improve
        if: inputs.auto_improve == true
        run: |
          TOKEN="${{ steps.app-token.outputs.token }}"
          docker run --rm \
            -e "github.user_token=${TOKEN}" \
            -e "github.deployment_type=user" \
            -e "OPENAI.KEY=${{ secrets.GROQ_API_KEY }}" \
            -e "OPENAI.API_TYPE=groq" \
            -e "config.model=groq/llama-3.3-70b-versatile" \
            -e "config.fallback_models=[]" \
            -e "config.temperature=0.2" \
            codiumai/pr-agent:latest \
            --pr_url="${{ inputs.pr_url }}" improve

      - name: Feedback Comment
        if: always() && inputs.feedback == true
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const marker = "**[pr-agent-feedback]**";
            const commentBody = `${marker}

            👋 Thanks for using PR Agent!

            You can re-run PR Agent by adding comments on the PR:
            - \`/review\` to run review
            - \`/describe\` to update PR description
            - \`/improve\` to get code suggestions`;

            const existing = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner,
              repo,
              per_page: 100,
            });

            const alreadyExists = existing.data.some(c => c.body?.includes(marker));
            if (!alreadyExists) {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner,
                repo,
                body: commentBody,
              });
            }
